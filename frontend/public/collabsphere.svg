<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Globe circle -->
  <circle cx="50" cy="50" r="28" stroke="#c0364b" stroke-width="3.5" fill="none"/>

  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="28" ry="11" stroke="#c0364b" stroke-width="2" fill="none"/>
  <line x1="22" y1="50" x2="78" y2="50" stroke="#c0364b" stroke-width="2"/>

  <!-- Longitude line (vertical) -->
  <ellipse cx="50" cy="50" rx="11" ry="28" stroke="#c0364b" stroke-width="2" fill="none"/>

  <!-- Circular arrow surrounding the globe -->
  <!-- Arc from top-right sweeping around (270° arc, leaving gap at top-right for arrowhead) -->
  <path d="M 72 30 A 32 32 0 1 0 75 38"
        stroke="#5a7051" stroke-width="4" fill="none"
        stroke-linecap="round"/>

  <!-- Arrowhead at end of arc -->
  <polygon points="75,38 85,30 78,44" fill="#5a7051"/>
</svg>
